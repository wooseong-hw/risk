name: update-data

# 저장소 경로: .github/workflows/update-data.yml
on:
  schedule:
    - cron: '0 15 * * *'   # 15:00 UTC = 00:00 KST
    - cron: '0 3 * * *'    # 03:00 UTC = 12:00 KST
  workflow_dispatch: {}      # Actions 탭에서 "Run workflow"로 즉시 수동 실행 가능

permissions:
  contents: write            # data.json 커밋/푸시에 필요

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market data
        run: python update_data.py

      - name: Commit if changed
        run: |
          git config user.name "krw-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh market data ($(date -u +%FT%TZ))"
            git push
          fi
